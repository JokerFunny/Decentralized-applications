services:
  # Message Broker
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: medicine-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # Database
  db:
    image: postgres:17
    container_name: medicine-db
    environment:
      POSTGRES_DB: MedicineDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MedicineDb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Module 1: API
  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    container_name: medicine-api
    ports:
      - "8081:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
      - RabbitMq__QueueName=medicine_queue
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  # Module 2: Worker
  worker:
    build:
      context: .
      dockerfile: Worker/Dockerfile
    container_name: medicine-worker
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=MedicineDb;Username=postgres;Password=password
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
      - RabbitMq__QueueName=medicine_queue
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      api:
        condition: service_started
